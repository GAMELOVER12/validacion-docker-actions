name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ==========================================
      # LOGIN A DOCKER HUB (CORREGIDO)
      # ==========================================
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: wearygamelov1
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ==========================================
      # CONFIGURAR DOCKER BUILDX
      # ==========================================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ==========================================
      # 1. VALIDACIÓN CON docker/build (call: check)
      # ==========================================
      - name: Validate build configuration
        uses: docker/build-push-action@v6
        with:
          call: check
          context: .
          file: ./Dockerfile

      # ==========================================
      # 2. CONSTRUCCIÓN Y PUSH CON docker/build
      # ==========================================
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: wearygamelov1/mi-app:latest
          context: .
          file: ./Dockerfile

      # ==========================================
      # 3. VALIDACIÓN CON BAKE (docker/bake-action)
      # ==========================================
      - name: Validate build configuration with Bake
        uses: docker/bake-action@v6
        with:
          targets: build
          call: check

      # ==========================================
      # 4. CONSTRUCCIÓN Y PUSH CON BAKE
      # ==========================================
      - name: Build and push with Bake
        uses: docker/bake-action@v6
        with:
          targets: build
          push: true
