name: Validación de compilación Docker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  validar-y-construir:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: 📂 Verificar archivos
        run: |
          ls -la
          echo "---"
          cat Dockerfile || echo "❌ Dockerfile no encontrado"

      - name: ⚙️ Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔍 Validar Dockerfile (comando directo)
        run: |
          docker build --check --no-cache .

      - name: 🏗️ Construir imagen Docker
        run: |
          docker build -t mi-app:validada .

      - name: 🧪 Probar imagen
        run: |
          docker run --rm mi-app:validada
          echo "✅ Imagen construida y validada correctamente"

      - name: ✅ Validación completada
        run: echo "🎉 Todas las validaciones pasaron exitosamente"
