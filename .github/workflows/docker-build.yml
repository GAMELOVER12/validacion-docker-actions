name: Validación, Build y Push a Docker Hub

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  validar-y-construir:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔍 Validar configuración de compilación
        uses: docker/build-push-action@v6
        with:
          call: check
          context: .
          file: ./Dockerfile
        continue-on-error: false

      - name: 🔑 Login a Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u wearygamelov1 --password-stdin

      - name: 📦 Instalar dependencias
        run: npm install

      - name: 🧪 Ejecutar pruebas unitarias
        run: npm test

      - name: 📊 Generar métricas de cobertura
        run: npm run test:coverage

      - name: 🏗️ Construir imagen Docker
        run: docker build -t wearygamelov1/mi-app:latest .

      - name: 📤 Subir imagen a Docker Hub
        run: docker push wearygamelov1/mi-app:latest

      - name: ✅ Validación completada
        run: echo "🎉 Todas las validaciones pasaron exitosamente"

      - name: ✅ Validación completada
        run: echo "🎉 Todas las validaciones pasaron exitosamente"
