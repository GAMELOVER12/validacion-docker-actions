name: Docker Build Validation

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Trabajo 1: Validación Simple (docker build)
  simple-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Comprobación de compilación simple (docker build)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: false
          # Esto fuerza un build en seco para validar sintaxis y compilación

  # Trabajo 2: Validación Avanzada (docker bake)
  bake-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Instalar Bake (HCL parser)
        uses: docker/bake-action@v4
        # Si se desea usar el comando directo, ver el siguiente paso
        
      - name: Comprobación de compilación con Docker Bake
        run: |
          # Construye todos los targets definidos en docker-bake.hcl
          # --print solo muestra las configuraciones, --set *.output=type=cacheonly evita guardar la imagen real
          docker buildx bake --print
          docker buildx bake --set "*.output=type=cacheonly"
